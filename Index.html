<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Notes App</title>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1020">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Nova Notes">
<link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(18, 25, 46, 0.84);
      --panel-2: rgba(24, 32, 58, 0.92);
      --border: rgba(255,255,255,0.08);
      --text: #edf2ff;
      --muted: #9fb0d3;
      --accent: #7c9cff;
      --accent-2: #66e3c4;
      --danger: #ff7a90;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,156,255,0.20), transparent 28%),
        radial-gradient(circle at top right, rgba(102,227,196,0.14), transparent 25%),
        linear-gradient(180deg, #08101f 0%, #0b1020 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      backdrop-filter: blur(2px);
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100vh;
      gap: 18px;
      padding: 18px;
    }

    .sidebar, .main {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
    }

    .brand h1 {
      margin: 0;
      font-size: 1.15rem;
      letter-spacing: 0.3px;
    }

    .brand .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 18px rgba(124,156,255,0.7);
      display: inline-block;
      margin-right: 10px;
      vertical-align: middle;
    }

    .toolbar {
      padding: 16px 16px 10px;
      display: grid;
      gap: 10px;
    }

    .btn, button {
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      background: linear-gradient(135deg, rgba(124,156,255,0.20), rgba(102,227,196,0.18));
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      transition: transform .18s ease, filter .18s ease, background .18s ease;
    }

    .btn:hover, button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    .btn.secondary {
      background: rgba(255,255,255,0.04);
      font-weight: 600;
    }

    .search {
      position: relative;
    }

    .search input, .title-input, textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 14px;
      outline: none;
      transition: border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .search input {
      padding: 12px 14px;
      font-size: 0.95rem;
    }

    .search input:focus, .title-input:focus, textarea:focus {
      border-color: rgba(124,156,255,0.7);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 0 0 4px rgba(124,156,255,0.12);
    }

    .stats {
      padding: 4px 18px 12px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .notes-list {
      overflow: auto;
      padding: 0 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .note-card {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }

    .note-card:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.06);
    }

    .note-card.active {
      background: linear-gradient(135deg, rgba(124,156,255,0.18), rgba(102,227,196,0.14));
      border-color: rgba(124,156,255,0.35);
    }

    .note-card h3 {
      margin: 0 0 6px;
      font-size: 0.98rem;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.4;
      height: 2.5em;
      overflow: hidden;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.77rem;
      margin-top: 10px;
    }

    .main {
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent);
    }

    .title-input {
      padding: 14px 16px;
      font-size: 1.5rem;
      font-weight: 800;
      background: rgba(255,255,255,0.03);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .editor-wrap {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
      padding: 18px;
      min-height: 0;
    }

    .editor-panel, .preview-panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    textarea {
      resize: none;
      flex: 1;
      border: none;
      border-radius: 0;
      background: transparent;
      padding: 18px;
      font: inherit;
      line-height: 1.7;
      font-size: 1rem;
    }

    .preview-panel .content {
      overflow: auto;
      padding: 18px;
      line-height: 1.75;
      color: #e8eeff;
    }

    .content h1, .content h2, .content h3 { margin-top: 0; }
    .content code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.92em;
    }
    .content pre {
      background: rgba(0,0,0,0.28);
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: 16px;
      overflow: auto;
    }
    .content blockquote {
      border-left: 4px solid rgba(124,156,255,0.75);
      margin: 0;
      padding: 6px 0 6px 14px;
      color: #d3defb;
    }
    .empty {
      color: var(--muted);
      padding: 18px;
      font-size: 0.95rem;
    }

    .pill {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
    }

    .danger {
      background: rgba(255,122,144,0.12);
      color: #ffd3da;
    }

    @media (max-width: 1100px) {
      .editor-wrap {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 820px) {
      body { overflow: auto; }
      .app {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
      }
      .sidebar, .main {
        min-height: 45vh;
      }
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }
      .actions {
        justify-content: stretch;
      }
      .actions button {
        flex: 1;
      }
    }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
    }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1><span class="dot"></span>Nova Notes</h1>
        <span class="pill" id="saveStatus">Saved</span>
      </div>

      <div class="toolbar">
        <button id="newNoteBtn">+ New Note</button>
        <div class="search">
          <input id="searchInput" type="text" placeholder="Search notes..." />
        </div>
      </div>

      <div class="stats" id="statsText">0 notes</div>

      <div class="notes-list" id="notesList"></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <input id="titleInput" class="title-input" type="text" placeholder="Untitled note" />
        <div class="actions">
          <button class="secondary" id="duplicateBtn">Duplicate</button>
          <button class="secondary" id="exportBtn">Export .txt</button>
          <button class="danger" id="deleteBtn">Delete</button>
        </div>
      </div>

      <div class="editor-wrap">
        <section class="editor-panel">
          <div class="panel-head">
            <span>Editor</span>
            <span id="wordCount">0 words</span>
          </div>
          <textarea id="bodyInput" placeholder="Write anything here...&#10;&#10;Supports simple markdown like # headings, **bold**, *italic*, `code`, and ``` blocks."></textarea>
        </section>

        <section class="preview-panel">
          <div class="panel-head">
            <span>Live Preview</span>
            <span class="pill">Local only</span>
          </div>
          <div class="content" id="previewOutput"></div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "nova_notes_v1";

    const el = {
      notesList: document.getElementById("notesList"),
      titleInput: document.getElementById("titleInput"),
      bodyInput: document.getElementById("bodyInput"),
      searchInput: document.getElementById("searchInput"),
      newNoteBtn: document.getElementById("newNoteBtn"),
      deleteBtn: document.getElementById("deleteBtn"),
      duplicateBtn: document.getElementById("duplicateBtn"),
      exportBtn: document.getElementById("exportBtn"),
      previewOutput: document.getElementById("previewOutput"),
      statsText: document.getElementById("statsText"),
      wordCount: document.getElementById("wordCount"),
      saveStatus: document.getElementById("saveStatus"),
    };

    let state = loadState();

    function defaultNote() {
      const now = Date.now();
      return {
        id: crypto.randomUUID ? crypto.randomUUID() : String(now + Math.random()),
        title: "Welcome Note",
        body:
`# Welcome to Nova Notes

This app saves everything **locally in your browser**.

## Features
- Beautiful glass-style UI
- Auto-save
- Search notes
- Duplicate notes
- Export note as .txt
- Live markdown preview

> Your notes stay on this device unless you export them.`,
        createdAt: now,
        updatedAt: now,
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          const first = defaultNote();
          return { notes: [first], selectedId: first.id, query: "" };
        }
        const parsed = JSON.parse(raw);
        if (!parsed.notes?.length) {
          const first = defaultNote();
          return { notes: [first], selectedId: first.id, query: "" };
        }
        return parsed;
      } catch {
        const first = defaultNote();
        return { notes: [first], selectedId: first.id, query: "" };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      el.saveStatus.textContent = "Saved";
    }

    function markSaving() {
      el.saveStatus.textContent = "Saving...";
      clearTimeout(markSaving._t);
      markSaving._t = setTimeout(saveState, 120);
    }

    function getSelectedNote() {
      return state.notes.find(n => n.id === state.selectedId) || state.notes[0] || null;
    }

    function setSelected(id) {
      state.selectedId = id;
      render();
    }

    function createNote() {
      const now = Date.now();
      const note = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(now + Math.random()),
        title: "Untitled Note",
        body: "",
        createdAt: now,
        updatedAt: now,
      };
      state.notes.unshift(note);
      state.selectedId = note.id;
      markSaving();
      render();
      el.titleInput.focus();
      el.titleInput.select();
    }

    function deleteNote() {
      const selected = getSelectedNote();
      if (!selected) return;
      if (!confirm(`Delete "${selected.title || "Untitled Note"}"?`)) return;
      state.notes = state.notes.filter(n => n.id !== selected.id);
      if (!state.notes.length) {
        const fresh = defaultNote();
        state.notes = [fresh];
        state.selectedId = fresh.id;
      } else {
        state.selectedId = state.notes[0].id;
      }
      markSaving();
      render();
    }

    function duplicateNote() {
      const current = getSelectedNote();
      if (!current) return;
      const now = Date.now();
      const copy = {
        ...current,
        id: crypto.randomUUID ? crypto.randomUUID() : String(now + Math.random()),
        title: current.title + " (Copy)",
        createdAt: now,
        updatedAt: now,
      };
      state.notes.unshift(copy);
      state.selectedId = copy.id;
      markSaving();
      render();
    }

    function exportNote() {
      const current = getSelectedNote();
      if (!current) return;
      const blob = new Blob([current.body], { type: "text/plain;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = (current.title || "note").replace(/[^\w\- ]+/g, "").trim() || "note";
      a.download += ".txt";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function updateSelected(patch) {
      const note = getSelectedNote();
      if (!note) return;
      Object.assign(note, patch, { updatedAt: Date.now() });
      markSaving();
      render(false);
    }

    function formatDate(ts) {
      return new Date(ts).toLocaleString([], {
        month: "short",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function simpleMarkdown(text) {
      let html = escapeHtml(text);

      html = html.replace(/```([\s\S]*?)```/g, (_, code) => `<pre><code>${code.trim()}</code></pre>`);
      html = html.replace(/^### (.*)$/gm, "<h3>$1</h3>");
      html = html.replace(/^## (.*)$/gm, "<h2>$1</h2>");
      html = html.replace(/^# (.*)$/gm, "<h1>$1</h1>");
      html = html.replace(/^> (.*)$/gm, "<blockquote>$1</blockquote>");
      html = html.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\*(.*?)\*/g, "<em>$1</em>");
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\n\n/g, "</p><p>");
      html = "<p>" + html + "</p>";
      html = html.replace(/<p><h/g, "<h").replace(/<\/h([1-3])><\/p>/g, "</h$1>");
      html = html.replace(/<p><blockquote>/g, "<blockquote>").replace(/<\/blockquote><\/p>/g, "</blockquote>");
      html = html.replace(/<p><pre>/g, "<pre>").replace(/<\/pre><\/p>/g, "</pre>");
      html = html.replace(/<p>\s*<\/p>/g, "");
      return html;
    }

    function getFilteredNotes() {
      const q = state.query.trim().toLowerCase();
      let notes = [...state.notes].sort((a, b) => b.updatedAt - a.updatedAt);
      if (!q) return notes;
      return notes.filter(n =>
        n.title.toLowerCase().includes(q) ||
        n.body.toLowerCase().includes(q)
      );
    }

    function render(full = true) {
      const selected = getSelectedNote();
      const filtered = getFilteredNotes();

      el.statsText.textContent = `${state.notes.length} note${state.notes.length === 1 ? "" : "s"}`;
      el.notesList.innerHTML = filtered.length ? "" : `<div class="empty">No notes matched your search.</div>`;

      filtered.forEach(note => {
        const card = document.createElement("div");
        card.className = "note-card" + (note.id === state.selectedId ? " active" : "");
        card.innerHTML = `
          <h3>${escapeHtml(note.title || "Untitled Note")}</h3>
          <div class="preview">${escapeHtml((note.body || "Empty note").replace(/\n/g, " "))}</div>
          <div class="meta">
            <span>${Math.max(0, (note.body || "").trim().split(/\s+/).filter(Boolean).length)} words</span>
            <span>${formatDate(note.updatedAt)}</span>
          </div>
        `;
        card.onclick = () => setSelected(note.id);
        el.notesList.appendChild(card);
      });

      if (!selected) return;

      if (full) {
        el.titleInput.value = selected.title;
        el.bodyInput.value = selected.body;
      }

      const wc = (selected.body || "").trim().split(/\s+/).filter(Boolean).length;
      el.wordCount.textContent = `${wc} word${wc === 1 ? "" : "s"}`;
      el.previewOutput.innerHTML = selected.body.trim()
        ? simpleMarkdown(selected.body)
        : `<div class="empty">Your live preview will appear here.</div>`;
    }

    el.newNoteBtn.addEventListener("click", createNote);
    el.deleteBtn.addEventListener("click", deleteNote);
    el.duplicateBtn.addEventListener("click", duplicateNote);
    el.exportBtn.addEventListener("click", exportNote);

    el.searchInput.addEventListener("input", (e) => {
      state.query = e.target.value;
      render();
    });

    el.titleInput.addEventListener("input", (e) => {
      updateSelected({ title: e.target.value || "Untitled Note" });
    });

    el.bodyInput.addEventListener("input", (e) => {
      updateSelected({ body: e.target.value });
    });

    window.addEventListener("keydown", (e) => {
      const ctrl = e.ctrlKey || e.metaKey;
      if (ctrl && e.key.toLowerCase() === "n") {
        e.preventDefault();
        createNote();
      }
      if (ctrl && e.key.toLowerCase() === "s") {
        e.preventDefault();
        saveState();
      }
    });

    render();
    saveState();

    if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
  </script>
</body>
</html>
